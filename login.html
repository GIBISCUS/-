<body>
    <header class="header">
        <div class="container">
            <a href="index.html" class="logo"><i data-feather="zap"></i> FitChallenge</a>
            <nav class="nav">
                <a href="index.html">Главная</a>
                <a href="challenges.html">Челленджи</a>
                <a href="map.html">Площадки</a>

            </nav>
        </div>
    </header>

    <main>
        <div class="form-container">
            <h2>Вход</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="example@mail.ru" required>
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" placeholder="Введите пароль" required>
                </div>
                <div id="errorMessage" class="error-message" style="display: none;"></div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Войти</button>
            </form>
            <div class="form-footer">
                <p>Нет аккаунта? <a href="register.html">Зарегистрироваться</a></p>
            </div>
            <div class="demo-info" style="margin-top: 20px; padding: 15px; background: #f0f0f0; border-radius: 8px; text-align: center;">
                <p style="margin: 0;"><strong>Демо-доступ:</strong><br>Админ: admin@fit.ru / admin123</p>
            </div>
        </div>
    </main>
